<!doctype html><html lang="pt-br"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><link rel="stylesheet" href="/static/css/styles.css"/><title>Admin • Biruta Park</title></head><body class="theme-easter"><main class="page-shell narrow-page"><section class="welcome-card"><div class="tag">PAINEL</div><h1>Entrar no painel</h1>{% if error %}<div class="inline-alert">{{ error }}</div>{% endif %}<form method="POST" class="single-form"><label><span>LOGIN</span><input class="field upper-input" name="login" required></label><label><span>SENHA</span><input class="field upper-input" type="password" name="password" required></label><button class="btn btn-gradient" type="submit">ENTRAR</button></form></section></main><script>document.querySelectorAll(".upper-input").forEach(el=> el.addEventListener("input", ()=> el.value=el.value.toUpperCase()));</script></body></html>
