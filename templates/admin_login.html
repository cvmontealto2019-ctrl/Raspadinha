<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Biruta Park</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff8e8, #ffe9f2);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #3a3153;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.9);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(90,70,120,.12);
      text-align: center;
    }

    .login-box img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 18px;
      background: #fff;
      padding: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 6px;
      color: #ff7a00;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: #7b7294;
    }

    form {
      display: grid;
      gap: 12px;
      text-align: left;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      color: #7b7294;
    }

    input {
      width: 100%;
      border: 1px solid rgba(90,70,120,.12);
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #ffb300;
      box-shadow: 0 0 0 4px rgba(255,179,0,.14);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(45deg, #ff7a00, #ffb300);
      color: #fff;
      margin-top: 6px;
    }

    .error {
      margin-bottom: 12px;
      background: #fff1f3;
      color: #c4364f;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" onerror="this.style.display='none'">
    <h1>Painel Admin</h1>
    <p>Entre para gerenciar clientes, jogadas e prêmios</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin') }}">
      <label>
        LOGIN
        <input type="text" name="user" required>
      </label>

      <label>
        SENHA
        <input type="password" name="password" required>
      </label>

      <button type="submit">Entrar no painel</button>
    </form>
  </div>
</body>
</html>
