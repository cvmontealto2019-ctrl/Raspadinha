<!doctype html><html lang="pt-br"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><link rel="stylesheet" href="/static/css/styles.css"/><title>Trocar senha • Biruta Park</title></head><body class="theme-easter"><main class="page-shell narrow-page"><section class="welcome-card"><div class="tag">SEGURANÇA</div><h1>Trocar senha</h1>{% if error %}<div class="inline-alert">{{ error }}</div>{% endif %}<form method="POST" class="single-form"><label><span>NOVA SENHA</span><input class="field upper-input" name="new_password" required></label><div class="result-actions"><button class="btn btn-gradient" type="submit">SALVAR</button><a class="btn btn-light" href="/game">VOLTAR</a></div></form></section></main><script>document.querySelectorAll(".upper-input").forEach(el=> el.addEventListener("input", ()=> el.value=el.value.toUpperCase()));</script></body></html>
