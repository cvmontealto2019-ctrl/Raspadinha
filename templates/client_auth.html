<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Biruta Park • Caça aos ovos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#fff8ef;
      --bg2:#fff1f7;
      --card:#ffffff;
      --text:#3b3153;
      --muted:#7a7292;
      --orange:#ff7a00;
      --orange2:#ffb347;
      --line:rgba(90,70,120,.10);
      --shadow:0 18px 45px rgba(90,70,120,.12);
      --shadow-soft:0 10px 24px rgba(90,70,120,.08);
    }

    *{
      box-sizing:border-box;
    }

    html{
      height:100%;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      min-height:100%;
      font-family:'Nunito',sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 500px at 0% 0%, rgba(255,217,90,.28), transparent 45%),
        radial-gradient(900px 420px at 100% 0%, rgba(255,103,168,.10), transparent 45%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      padding:20px 14px 28px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(18px);
      opacity:.45;
      pointer-events:none;
      z-index:0;
    }

    .o1{width:180px;height:180px;left:-40px;top:-20px;background:#ffd86b;}
    .o2{width:220px;height:220px;right:-50px;top:40px;background:#ffc1df;}
    .o3{width:170px;height:170px;left:8%;bottom:-50px;background:#b9f0ff;}
    .o4{width:130px;height:130px;right:12%;bottom:10%;background:#d7c6ff;}

    .shell{
      position:relative;
      z-index:1;
      width:min(1120px, 100%);
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:20px;
      align-items:stretch;
    }

    .scene{
      position:relative;
      min-height:620px;
      border-radius:34px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,.85), transparent 18%),
        linear-gradient(180deg,#caefff 0%,#effbff 38%,#d8f4d7 40%,#9bd386 63%,#6aad63 100%);
      box-shadow:var(--shadow);
    }

    .cloud{
      position:absolute;
      background:rgba(255,255,255,.88);
      border-radius:999px;
    }

    .cloud:before,
    .cloud:after{
      content:"";
      position:absolute;
      background:inherit;
      border-radius:inherit;
    }

    .c1{width:170px;height:48px;left:12%;top:10%;}
    .c1:before{width:60px;height:60px;left:24px;top:-24px;}
    .c1:after{width:70px;height:70px;right:22px;top:-32px;}

    .c2{width:220px;height:56px;right:10%;top:18%;}
    .c2:before{width:64px;height:64px;left:30px;top:-20px;}
    .c2:after{width:76px;height:76px;right:28px;top:-34px;}

    .hill{
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:-8%;
      height:45%;
      background:linear-gradient(180deg,#7cc46f,#4e9d45);
      border-radius:50% 50% 0 0;
    }

    .bunny{
      position:absolute;
      right:16%;
      bottom:16%;
      font-size:96px;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.12));
    }

    .stars{
      position:absolute;
      left:16%;
      top:20%;
      font-size:26px;
      color:#fff8c6;
      text-shadow:0 0 18px rgba(255,255,255,.8);
    }

    .egg{
      position:absolute;
      width:82px;
      height:104px;
      border-radius:50% 50% 46% 46%;
      box-shadow:0 12px 24px rgba(66,46,90,.14);
      border:4px solid rgba(255,255,255,.92);
    }

    .egg:after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:50%;
      height:14px;
      transform:translateY(-50%);
      background:rgba(255,255,255,.22);
    }

    .egg1{left:18%;bottom:15%;background:linear-gradient(180deg,#ffe082,#f7b73f);}
    .egg2{left:34%;bottom:23%;background:linear-gradient(180deg,#ffb4d6,#ff6fa7);}
    .egg3{left:56%;bottom:14%;background:linear-gradient(180deg,#c7d6ff,#8ea1ff);}

    .panel{
      width:100%;
      background:rgba(255,255,255,.94);
      border-radius:30px;
      padding:34px;
      box-shadow:var(--shadow);
      align-self:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,217,90,.30);
      color:#8a5c22;
      font-weight:900;
      font-size:12px;
      letter-spacing:.4px;
      text-transform:uppercase;
    }

    h1{
      margin:12px 0 8px;
      font-family:'Baloo 2',sans-serif;
      color:var(--orange);
      font-size:46px;
      line-height:.92;
    }

    .subtitle{
      margin:0 0 18px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }

    .form{
      display:grid;
      gap:12px;
    }

    .field-wrap{
      display:grid;
      gap:7px;
    }

    .field-wrap span{
      font-size:12px;
      font-weight:800;
      color:#7f7596;
      letter-spacing:.3px;
    }

    .field{
      width:100%;
      border:none;
      border-radius:16px;
      padding:15px 16px;
      background:#fff;
      box-shadow:inset 0 0 0 1px rgba(113,96,138,.10);
      font-size:16px;
      color:var(--text);
      outline:none;
      appearance:none;
      -webkit-appearance:none;
    }

    .field:focus{
      box-shadow:inset 0 0 0 2px rgba(255,122,0,.25), 0 0 0 4px rgba(255,179,71,.12);
    }

    .notice{
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
      background:rgba(255,255,255,.75);
      border-radius:16px;
      padding:12px 14px;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:15px 20px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      color:#fff;
      background:linear-gradient(45deg,var(--orange),var(--orange2));
      box-shadow:0 12px 24px rgba(255,122,0,.22);
      font-size:16px;
      min-height:52px;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    @media (max-width: 980px){
      .page{
        padding:16px 12px 24px;
        align-items:flex-start;
      }

      .shell{
        grid-template-columns:1fr;
        gap:14px;
      }

      .scene{
        min-height:280px;
      }

      .panel{
        padding:24px 18px 22px;
      }

      h1{
        font-size:38px;
      }

      .bunny{
        font-size:72px;
        right:10%;
        bottom:12%;
      }

      .stars{
        font-size:22px;
      }

      .egg{
        transform:scale(.88);
      }
    }

    @media (max-width: 640px){
      .page{
        padding:12px 10px 18px;
      }

      .shell{
        gap:12px;
      }

      .scene{
        min-height:220px;
        border-radius:24px;
      }

      .panel{
        border-radius:24px;
        padding:18px 14px 16px;
      }

      h1{
        font-size:32px;
        line-height:.95;
      }

      .subtitle{
        font-size:14px;
        margin-bottom:14px;
      }

      .field{
        padding:14px 14px;
        font-size:16px;
      }

      .btn{
        width:100%;
      }

      .bunny{
        font-size:58px;
        right:8%;
        bottom:10%;
      }

      .stars{
        left:10%;
        top:16%;
        font-size:18px;
      }

      .egg{
        transform:scale(.72);
      }

      .c1{
        width:120px;
        height:38px;
        left:8%;
      }

      .c2{
        width:150px;
        height:42px;
        right:6%;
      }
    }
  </style>
</head>
<body class="auth-bg">
  <div class="page">
    <span class="orb o1"></span>
    <span class="orb o2"></span>
    <span class="orb o3"></span>
    <span class="orb o4"></span>

    <main class="shell">
     <section class="scene" style="padding:0; overflow:hidden;">
  <img 
    src="{{ url_for('static', filename='img/capa_pascoa.png') }}" 
    style="width:100%; height:100%; object-fit:cover; border-radius:30px;"
  >
</section>

      <section class="panel">
        <div class="badge">CAMPANHA DE PÁSCOA</div>
        <h1>Caça aos Ovos Mágica</h1>
        <p class="subtitle">
          Cadastre-se para descobrir uma cortesia especial para o fechamento do seu novo contrato.
        </p>

        <form method="POST" action="{{ url_for('enter') }}" class="form" novalidate>
          <label class="field-wrap">
            <span>Nome completo</span>
            <input id="name" class="field" type="text" name="name" placeholder="Ex: Maria Souza" required>
          </label>

          <label class="field-wrap">
            <span>WhatsApp</span>
            <input id="phone" class="field" type="tel" name="phone" placeholder="(16) 99999-9999" required>
          </label>

          <div class="notice">
            Você pode jogar novamente quantas vezes quiser. Ao ganhar uma nova cortesia, a anterior será substituída.
          </div>

          <button class="btn" type="submit">Participar da campanha</button>
        </form>
      </section>
    </main>
  </div>

  <script>
    const phoneInput = document.getElementById("phone");

    phoneInput.addEventListener("input", () => {
      let v = phoneInput.value.replace(/\D/g, "");
      if (v.length > 11) v = v.slice(0, 11);

      if (v.length > 6) {
        v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
      } else if (v.length > 2) {
        v = v.replace(/(\d{2})(\d+)/, "($1) $2");
      }

      phoneInput.value = v;
    });
  </script>
</body>
</html>
