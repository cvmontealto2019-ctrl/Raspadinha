<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça aos Ovos Mágica</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<style>
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:linear-gradient(#fff8ef,#fff0f5);
  text-align:center;
}

h1{
  font-family:'Baloo 2';
  color:#ff7a00;
}

#lives{
  font-size:22px;
  margin:10px;
}

.board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  padding:20px;
}

.egg{
  background:radial-gradient(circle,#fff,#ffd9a0);
  border-radius:50%;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  font-size:18px;
}

.egg:hover{
  transform:scale(1.05);
}

.revealed{
  background:#fff;
}

.hidden{
  display:none;
}

button{
  padding:14px 22px;
  border:none;
  border-radius:20px;
  background:#ff7a00;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}
</style>

</head>
<body>

<h1>🐰 Caça aos Ovos Mágica</h1>

<p>Uma surpresa especial está escondida para você ✨</p>

<div id="lives">❤️❤️❤️</div>

<button id="start-btn">COMEÇAR AGORA</button>

<div id="board" class="board"></div>

<div id="result" class="hidden">
  <h2 id="resultText"></h2>
  <a id="whatsapp" target="_blank">Ir para WhatsApp</a>
</div>

<script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>
</html>
